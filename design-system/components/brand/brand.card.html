<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--ink-800); padding: 36px 44px; color: var(--bone-300); }
  .row { display: flex; flex-direction: column; gap: 30px; }
  .lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: rgba(239,237,230,0.45); margin: 0 0 10px; }

  #root > * { width: 100%; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel">
    const { Wordmark, SubMark } = window.NikkoEcoIdentidad_d12537;
    const App = () => (
      <div className="row">
        <div>
          <p className="lbl">Wordmark · tamaño xl</p>
          <Wordmark size="xl" tone="light" />
        </div>
        <div>
          <p className="lbl">Sub-marcas · tamaño md</p>
          <div className="sub-grid">
            <SubMark brand="Seguros" size="md" />
            <SubMark brand="Hogar" size="md" />
            <SubMark brand="Obras" size="md" />
            <SubMark brand="Capital" size="md" />
          </div>
        </div>
      </div>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
