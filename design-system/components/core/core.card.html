<!-- @dsCard group="Components" viewport="700x680" name="Core UI · Button + Card + Badge + Eyebrow + Input" subtitle="Componentes base del sistema" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bone-300); padding: 28px 32px; color: var(--ink-800); }
  .stack { display: flex; flex-direction: column; gap: 32px; }
  .block-lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: var(--ink-400); margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }
  .block-lbl::before { content:""; width: 18px; height: 1px; background: var(--amber-500); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel">
    const { Button, Card, Badge, Eyebrow, Input } = window.NikkoEcoIdentidad_d12537;

    const App = () => (
      <div className="stack">

        <div>
          <p className="block-lbl">Buttons</p>
          <div className="row">
            <Button variant="primary">Solicitar presupuesto</Button>
            <Button variant="secondary">Más información</Button>
            <Button variant="outline">Llamar</Button>
            <Button variant="ghost">Cancelar</Button>
            <Button variant="link">Ver detalle</Button>
          </div>
          <div className="row" style={{ marginTop: 12 }}>
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="md">Medium</Button>
            <Button variant="primary" size="lg">Large</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>

        <div>
          <p className="block-lbl">Badges</p>
          <div className="row">
            <Badge variant="default">Borrador</Badge>
            <Badge variant="accent">Nuevo</Badge>
            <Badge variant="accentSoft">Pendiente</Badge>
            <Badge variant="positive">Cerrado</Badge>
            <Badge variant="negative">Retraso</Badge>
            <Badge variant="inverse">Archivado</Badge>
          </div>
        </div>

        <div>
          <p className="block-lbl">Eyebrow</p>
          <div className="row" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 12 }}>
            <Eyebrow tone="ink">Servicios · Nikko Hogar</Eyebrow>
            <Eyebrow tone="accent">Caso de uso · Reformas</Eyebrow>
          </div>
        </div>

        <div>
          <p className="block-lbl">Cards</p>
          <div className="grid-cards">
            <Card variant="raised" padding="md">
              <Eyebrow tone="accent">Nikko Hogar</Eyebrow>
              <h3 style={{ fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 22, letterSpacing: '-0.03em', margin: '12px 0 6px' }}>Reparaciones 24/7</h3>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 13, lineHeight: 1.5, color: 'var(--ink-400)', margin: 0 }}>Técnico cualificado y cualquier gremio bajo el mismo paraguas.</p>
            </Card>
            <Card variant="inverse" padding="md">
              <Eyebrow tone="accent">Nikko Capital</Eyebrow>
              <h3 style={{ fontFamily: 'var(--font-sans)', fontWeight: 700, fontSize: 22, letterSpacing: '-0.03em', margin: '12px 0 6px', color: 'var(--bone-300)' }}>Inversión patrimonial</h3>
              <p style={{ fontFamily: 'var(--font-sans)', fontSize: 13, lineHeight: 1.5, color: 'rgba(239,237,230,0.65)', margin: 0 }}>Activos seleccionados, reformados y puestos en renta.</p>
            </Card>
          </div>
        </div>

        <div>
          <p className="block-lbl">Inputs</p>
          <div className="inputs">
            <Input label="Email" type="email" placeholder="alguien@empresa.com" hint="No usamos tu email para nada más." />
            <Input label="Teléfono" type="tel" defaultValue="+34 600 000 000" error="Formato inválido." />
          </div>
        </div>

      </div>
    );
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
