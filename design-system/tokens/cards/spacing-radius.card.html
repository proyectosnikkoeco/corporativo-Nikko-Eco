<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bone-200); padding: 22px 28px; color: var(--ink-800); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .box { background: var(--ink-800); height: 70px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; color: var(--bone-300); }
  .box.amber { background: var(--amber-400); color: var(--ink-900); }
  .k { font-family: var(--font-meta); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; line-height: 1.3; }
  .v { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius: var(--radius-0);"><span class="k">radius-0</span><span class="v">0 px</span></div>
    <div class="box" style="border-radius: var(--radius-1);"><span class="k">radius-1</span><span class="v">2 px</span></div>
    <div class="box" style="border-radius: var(--radius-2);"><span class="k">radius-2</span><span class="v">4 px</span></div>
    <div class="box" style="border-radius: var(--radius-3);"><span class="k">radius-3</span><span class="v">6 px</span></div>
    <div class="box amber" style="border-radius: var(--radius-4);"><span class="k">radius-4</span><span class="v">10 px</span></div>
    <div class="box amber" style="border-radius: var(--radius-pill);"><span class="k">pill</span><span class="v">∞</span></div>
  </div>
</body>
</html>
