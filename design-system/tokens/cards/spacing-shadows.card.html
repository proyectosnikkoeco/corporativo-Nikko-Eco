<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bone-200); padding: 28px 28px; color: var(--ink-800); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .box { background: var(--bone-100); height: 90px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; border: 1px solid var(--border-soft); }
  .k { font-family: var(--font-meta); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); line-height: 1.3; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--ink-300); }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="box-shadow: var(--shadow-1);"><span class="k">shadow-1</span><span class="v">hairline</span></div>
    <div class="box" style="box-shadow: var(--shadow-2);"><span class="k">shadow-2</span><span class="v">card</span></div>
    <div class="box" style="box-shadow: var(--shadow-3);"><span class="k">shadow-3</span><span class="v">elevated</span></div>
    <div class="box" style="box-shadow: var(--shadow-4);"><span class="k">shadow-4</span><span class="v">modal</span></div>
  </div>
</body>
</html>
