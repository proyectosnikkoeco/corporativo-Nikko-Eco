<!-- @dsCard group="Colors" viewport="700x140" name="Estados" subtitle="Positivo, atención, negativo — uso reservado" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bone-300); padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .st { padding: 16px 18px; border: 1px solid var(--border-soft); background: var(--bone-100); display: flex; align-items: center; gap: 14px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .info { font-family: var(--font-sans); font-size: 12.5px; line-height: 1.3; }
  .nm { font-weight: var(--fw-semibold); color: var(--ink-800); display: block; }
  .hx { font-family: var(--font-meta); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="row">
    <div class="st"><div class="dot" style="background: var(--positive);"></div><div class="info"><span class="nm">Positivo</span><span class="hx">5BE26B</span></div></div>
    <div class="st"><div class="dot" style="background: var(--amber-400);"></div><div class="info"><span class="nm">Atención</span><span class="hx">F0B73E · amber</span></div></div>
    <div class="st"><div class="dot" style="background: var(--negative);"></div><div class="info"><span class="nm">Negativo</span><span class="hx">B85050</span></div></div>
  </div>
</body>
</html>
