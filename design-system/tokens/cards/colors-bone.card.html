<!-- @dsCard group="Colors" viewport="700x150" name="Hueso · bone scale" subtitle="Superficies claras, papel" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--ink-700); padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { aspect-ratio: 2.4 / 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; font-family: var(--font-meta); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-800); line-height: 1.3; }
  .sw .n { font-weight: var(--fw-semibold); }
  .sw .h { opacity: 0.7; font-size: 9.5px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--bone-100);"><span class="n">100</span><span class="h">FAF8F1</span></div>
    <div class="sw" style="background: var(--bone-200);"><span class="n">200</span><span class="h">F6F4ED</span></div>
    <div class="sw" style="background: var(--bone-300);"><span class="n">300</span><span class="h">EFEDE6</span></div>
    <div class="sw" style="background: var(--bone-400);"><span class="n">400</span><span class="h">E5E2D9</span></div>
  </div>
</body>
</html>
