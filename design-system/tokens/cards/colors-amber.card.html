<!-- @dsCard group="Colors" viewport="700x150" name="Ámbar · amber scale" subtitle="Único acento cálido del sistema" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--ink-800); padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.6 / 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; font-family: var(--font-meta); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; line-height: 1.3; }
  .sw .n { font-weight: var(--fw-semibold); }
  .sw .h { opacity: 0.75; font-size: 9.5px; }
  .dark { color: var(--ink-900); }
  .light { color: var(--bone-300); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark" style="background: var(--amber-300);"><span class="n">300</span><span class="h">F8D17A</span></div>
    <div class="sw dark" style="background: var(--amber-400);"><span class="n">400 · primario</span><span class="h">F0B73E</span></div>
    <div class="sw dark" style="background: var(--amber-500);"><span class="n">500</span><span class="h">E89C2E</span></div>
    <div class="sw light" style="background: var(--amber-600);"><span class="n">600</span><span class="h">C78122</span></div>
    <div class="sw light" style="background: var(--amber-700);"><span class="n">700</span><span class="h">8C5A18</span></div>
  </div>
</body>
</html>
