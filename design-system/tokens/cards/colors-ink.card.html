<!-- @dsCard group="Colors" viewport="700x150" name="Tinta · ink scale" subtitle="Fondos oscuros, texto sobre claro" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--bone-200); padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
  .sw { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; font-family: var(--font-meta); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; line-height: 1.3; }
  .sw .n { font-weight: var(--fw-semibold); }
  .sw .h { opacity: 0.7; font-size: 9px; }
  .dark { color: var(--bone-300); }
  .light { color: var(--ink-800); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark" style="background: var(--ink-900);"><span class="n">900</span><span class="h">050811</span></div>
    <div class="sw dark" style="background: var(--ink-800);"><span class="n">800</span><span class="h">0A0E1A</span></div>
    <div class="sw dark" style="background: var(--ink-700);"><span class="n">700</span><span class="h">131826</span></div>
    <div class="sw dark" style="background: var(--ink-600);"><span class="n">600</span><span class="h">1C2233</span></div>
    <div class="sw dark" style="background: var(--ink-500);"><span class="n">500</span><span class="h">2A3142</span></div>
    <div class="sw light" style="background: var(--ink-400);"><span class="n">400</span><span class="h">4A5566</span></div>
    <div class="sw light" style="background: var(--ink-300);"><span class="n">300</span><span class="h">8A92A0</span></div>
    <div class="sw light" style="background: var(--ink-200);"><span class="n">200</span><span class="h">C3C8D1</span></div>
    <div class="sw light" style="background: var(--ink-100);"><span class="n">100</span><span class="h">E2E5EA</span></div>
  </div>
</body>
</html>
