<!-- @dsCard group="Type" viewport="700x180" name="Geist Mono" subtitle="Metadatos, eyebrows, etiquetas técnicas" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { background: var(--bone-300); padding: 28px 32px; color: var(--ink-800); }
  .lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: var(--ink-400); margin: 0 0 14px; }
  .row { font-family: var(--font-mono); font-weight: var(--fw-medium); font-size: 56px; letter-spacing: 0.06em; line-height: 1; color: var(--ink-800); }
  .meta { font-family: var(--font-meta); font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-400); display: block; margin-top: 8px; }
  .ex { display: flex; gap: 24px; margin-top: 18px; }
  .ex span { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: var(--amber-600); }
</style>
</head>
<body>
  <p class="lbl">Geist Mono</p>
  <div class="row">Aa 123</div>
  <div class="ex">
    <span>NKK / HM-001</span>
    <span>v0.1 · BORRADOR</span>
    <span>JUN · 2026</span>
  </div>
</body>
</html>
