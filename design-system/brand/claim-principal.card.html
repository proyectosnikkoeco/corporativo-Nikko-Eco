<!doctype html>
<html lang="es">
<head>

<link rel="stylesheet" href="../styles.css" />

  body::before { content:""; position: absolute; right: -120px; top: -80px; width: 420px; height: 420px; background: radial-gradient(circle, rgba(240,183,62,0.12), transparent 60%); }
  .claim { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: 76px; line-height: 0.95; letter-spacing: var(--ls-display); margin: 0; position: relative; z-index: 1; }
  .claim .you { color: rgba(239,237,230,0.55); display: block; }
  .claim .us { color: var(--amber-400); display: block; }
  .lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: rgba(239,237,230,0.45); margin: 20px 0 0; position: relative; z-index: 1; }
</style>
</head>
<body>
  <p class="claim"><span class="you">Tus objetivos,</span><span class="us">nuestra meta.</span></p>
