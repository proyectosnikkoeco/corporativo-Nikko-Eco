  .claim .you { color: rgba(10,14,26,0.5); display: block; }
  .claim .us { color: var(--amber-600); font-style: italic; display: block; }
  .lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: var(--ink-400); margin: 20px 0 0; position: relative; z-index: 1; }

</head>
<body>
