<!-- @dsCard group="Brand" viewport="700x320" name="Wordmark · positivo" subtitle="Nikko en sans + Eco en italic serif amber" -->
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--ink-800); padding: 48px 56px; color: var(--bone-300); }
  .stack { display: flex; flex-direction: column; gap: 28px; align-items: flex-start; }
  .wm { font-family: var(--font-brand); font-weight: var(--fw-bold); letter-spacing: -0.06em; line-height: 0.86; color: var(--bone-300); display: inline-flex; align-items: flex-end; gap: 6px; }
  .wm .eco { font-family: var(--font-brand-italic); font-style: italic; font-weight: var(--fw-light); font-size: 0.55em; color: var(--amber-400); letter-spacing: -0.04em; margin-bottom: 0.06em; line-height: 1; }
  .wm.s1 { font-size: 96px; }
  .wm.s2 { font-size: 48px; }
  .wm.s3 { font-size: 22px; }
  .lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: rgba(239,237,230,0.45); margin-top: 6px; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <span class="wm s1">Nikko<span class="eco">Eco.</span></span>
      <div class="lbl">XL · Hero, pared, fachada</div>
    </div>
    <div>
      <span class="wm s2">Nikko<span class="eco">Eco.</span></span>
      <div class="lbl">M · Documentos, cabeceras</div>
    </div>
    <div>
      <span class="wm s3">Nikko<span class="eco">Eco.</span></span>
      <div class="lbl">S · Email, firma, favicon-text</div>
    </div>
  </div>
</body>
</html>
