<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { background: var(--ink-800); padding: 40px 56px; color: var(--bone-300); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 48px; }
  .sm { font-family: var(--font-brand); font-weight: var(--fw-bold); letter-spacing: -0.05em; font-size: 38px; line-height: 1; color: var(--bone-300); display: flex; align-items: baseline; gap: 6px; }
  .sm .nk { color: var(--bone-300); }
  .sm .desc { color: var(--amber-400); font-weight: var(--fw-medium); letter-spacing: -0.04em; }
  .lbl { font-family: var(--font-meta); font-size: 10px; letter-spacing: var(--ls-mono); text-transform: uppercase; color: rgba(239,237,230,0.45); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <span class="sm"><span class="nk">Nikko</span> <span class="desc">Seguros</span></span>
      <div class="lbl">B2B compañías</div>
    </div>
    <div>
      <span class="sm"><span class="nk">Nikko</span> <span class="desc">Hogar</span></span>
      <div class="lbl">Particulares y comunidades</div>
    </div>
    <div>
      <span class="sm"><span class="nk">Nikko</span> <span class="desc">Obras</span></span>
      <div class="lbl">Reformas integrales</div>
    </div>
    <div>
      <span class="sm"><span class="nk">Nikko</span> <span class="desc">Capital</span></span>
      <div class="lbl">Inversión inmobiliaria</div>
    </div>
  </div>
</body>
</html>
